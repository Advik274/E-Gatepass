services:
  - type: web
    name: gatepass-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/auth/health

    envVars:
      - key: PORT
        value: 8080
      - key: DDL_AUTO
        value: update
      - key: PGHOST
        fromDatabase:
          name: gatepass-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: gatepass-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: gatepass-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: gatepass-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: gatepass-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: CORS_ALLOWED_ORIGINS
        value: https://gatepass.vercel.app   # update to your real Vercel URL

databases:
  - name: gatepass-db
    databaseName: gatepass
    plan: free
    region: singapore
