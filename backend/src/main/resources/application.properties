# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' in prod so Hibernate never drops your data.
# On first deploy set to 'update' so Hibernate creates the schema, then switch to 'validate'.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Keep connections alive through Fly.io proxy idle timeout
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.gatepass=INFO
logging.level.org.springframework.security=WARN

# ── App ───────────────────────────────────────────────────────────────────────
app.name=GatePass Pro
app.version=1.0.0
app.qr.expiry-hours=24
